apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            sub_filter_once off;
            sub_filter '${ARTIST_NAME}' '$ARTIST_NAME';
            sub_filter '${BIRTH_YEAR}' '$BIRTH_YEAR';
            sub_filter '${BIRTH_PLACE}' '$BIRTH_PLACE';
            sub_filter '${SHORT_BIO}' '$SHORT_BIO';
            sub_filter '${FAMOUS_QUOTE}' '$FAMOUS_QUOTE';
            sub_filter '${CURRENT_ALBUM}' '$CURRENT_ALBUM';
            sub_filter '${NOTABLE_AWARD}' '$NOTABLE_AWARD';
            sub_filter '${PAGE_COLOR}' '$PAGE_COLOR';
            sub_filter '${HOSTNAME}' '$HOSTNAME';
            sub_filter '${CONFIG_PATH}' '$CONFIG_PATH';
        }

        # Health check
        location /health {
            return 200 'OK';
        }

        # redirect server error pages to the static page /50x.html
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
  nginx.conf: |
    user  nginx;
    worker_processes  auto;

    error_log  /var/log/nginx/error.log notice;
    pid        /var/run/nginx.pid;

    events {
        worker_connections  1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

        access_log  /var/log/nginx/access.log  main;

        sendfile        on;
        #tcp_nopush     on;

        keepalive_timeout  65;

        # Enable environment variable substitution
        env ARTIST_NAME;
        env BIRTH_YEAR;
        env BIRTH_PLACE;
        env SHORT_BIO;
        env FAMOUS_QUOTE;
        env CURRENT_ALBUM;
        env NOTABLE_AWARD;
        env PAGE_COLOR;
        env HOSTNAME;
        env CONFIG_PATH;

        # Enable sub_filter module
        include /etc/nginx/conf.d/*.conf;
    }