apiVersion: apps/v1
kind: Deployment
metadata:
  name: heathkit-dashboard
  labels:
    app: heathkit-dashboard
    environment: production
  annotations:
    kubernetes.io/description: "System information dashboard for HeathKit Cloud Inc."
    prometheus.io/scrape: "true"
    prometheus.io/port: "9113"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: heathkit-dashboard
  template:
    metadata:
      labels:
        app: heathkit-dashboard
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
    spec:
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            timeoutSeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            timeoutSeconds: 2
            periodSeconds: 10
          volumeMounts:
            - name: html-content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html-content
          configMap:
            name: heathkit-dashboard-content
