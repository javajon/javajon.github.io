apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dashboard-to-engine
  namespace: model-system
spec:
  podSelector:
    matchLabels:
      app: climate-model-engine
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: dashboard-system
      podSelector:
        matchLabels:
          app: climate-dashboard
    ports:
    - protocol: TCP
      port: 8080