apiVersion: apps/v1
kind: Deployment
metadata:
  name: climate-model-engine
  namespace: model-system
  labels:
    app: climate-model-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: climate-model-engine
  template:
    metadata:
      labels:
        app: climate-model-engine
    spec:
      containers:
      - name: model-engine
        image: python:3.13.3-slim
        ports:
        - containerPort: 8080
        command: ["python"]
        args: ["/server.py"]
        readinessProbe:
          httpGet:
            path: /status
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /status
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: model-script
          mountPath: /server.py
          subPath: server.py
      volumes:
      - name: model-script
        configMap:
          name: model-engine-script
          items:
          - key: server.py
            path: server.py
