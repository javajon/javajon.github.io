apiVersion: v1
kind: ServiceAccount
metadata:
  name: snowflake-melter
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: snowflake-melter
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: snowflake-melter
subjects:
- kind: ServiceAccount
  name: snowflake-melter
  namespace: default
roleRef:
  kind: ClusterRole
  name: snowflake-melter
  apiGroup: rbac.authorization.k8s.io
