apiVersion: apps/v1
kind: Deployment
metadata:
  name: climate-dashboard
  namespace: dashboard-system
  labels:
    app: climate-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: climate-dashboard
  template:
    metadata:
      labels:
        app: climate-dashboard
    spec:
      containers:
      - name: dashboard
        image: nginx:1.29-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: dashboard-html
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: nginx-config
        configMap:
          name: dashboard-config
          items:
          - key: nginx-config
            path: default.conf
      - name: dashboard-html
        configMap:
          name: dashboard-html
          items:
          - key: index.html
            path: index.html
