apiVersion: apps/v1
kind: Deployment
metadata:
  name: disease-dashboard
  labels:
    app: disease-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: disease-dashboard
  template:
    metadata:
      labels:
        app: disease-dashboard
    spec:
      initContainers:
      - name: data-initializer
        image: node:16-alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            node /scripts/fetch_disease_data.js
        volumeMounts:
        - name: data-volume
          mountPath: /data
        - name: script-volume
          mountPath: /scripts
      containers:
      - name: nginx
        image: nginx:1.29-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: data-volume
          mountPath: /usr/share/nginx/html/data
        - name: config-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: data-volume
        emptyDir: {}
      - name: config-volume
        configMap:
          name: dashboard-config
      - name: script-volume
        configMap:
          name: data-fetcher-script
          defaultMode: 0755
