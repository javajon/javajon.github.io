apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-analyzer
  labels:
    app: data-analyzer
spec:
  replicas: 5
  selector:
    matchLabels:
      app: data-analyzer
  template:
    metadata:
      labels:
        app: data-analyzer
    spec:
      containers:
        - name: data-analyzer
          image: $IMAGE
          env:
            - name: DATASET_GROWTH
              value: "5000"
            - name: MAX_DATASET_SIZE
              value: "50000"
            - name: PROCESSING_INTERVAL
              value: "1"
            - name: BATCH_SIZE
              value: "1000"
            - name: CLEANUP_THRESHOLD
              value: "0.9"
          resources:
            requests:
              memory: "100Mi"
              cpu: "50m"
            limits:
              memory: "200Mi"
              cpu: "100m"
