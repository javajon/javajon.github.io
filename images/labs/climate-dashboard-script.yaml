apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: dashboard-system
data:
  nginx-config: |
    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # Proxy API requests to the model engine
        location /api/ {
            proxy_pass http://climate-model-engine.model-system.svc.cluster.local:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-html
  namespace: dashboard-system
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Climate Forward - AI Climate Model Dashboard</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #f0f5f5;
                color: #333;
            }
            .container {
                max-width: 800px;
                margin: 0 auto;
                padding: 20px;
            }
            header {
                background-color: #2c3e50;
                color: white;
                padding: 20px;
                text-align: center;
            }
            .status {
                margin: 20px 0;
                padding: 15px;
                border-radius: 4px;
            }
            .success {
                background-color: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }
            .error {
                background-color: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }
            .loading {
                background-color: #fff3cd;
                color: #856404;
                border: 1px solid #ffeeba;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>ClimateForward AI Modeling Platform</h1>
        </header>
        <div class="container">
            <h2>Global Climate Model Results</h2>
            <div id="status" class="status loading">
                Connecting to Climate Model Engine...
            </div>
            <div id="result"></div>
        </div>
        <script>
            // Simple function to check connection to the model engine
            async function checkModelEngine() {
                try {
                    const response = await fetch('/api/status');
                    if (response.ok) {
                        document.getElementById('status').className = 'status success';
                        document.getElementById('status').innerText = 'Connected to Climate Model Engine';
                        getModelResults();
                    } else {
                        throw new Error('Failed to connect');
                    }
                } catch (error) {
                    document.getElementById('status').className = 'status error';
                    document.getElementById('status').innerText = 'ERROR: Cannot connect to Climate Model Engine. The service may be unreachable.';
                }
            }

            // Get model prediction results
            async function getModelResults() {
                try {
                    const response = await fetch('/api/predict');
                    if (response.ok) {
                        const data = await response.text();
                        document.getElementById('result').innerHTML = `
                            <div class="status success">
                                <h3>Model Prediction:</h3>
                                <p>${data}</p>
                            </div>
                        `;
                    }
                } catch (error) {
                    console.error('Error fetching prediction:', error);
                }
            }

            // Check connection when page loads
            window.onload = function() {
                setTimeout(checkModelEngine, 1000);
            };
        </script>
    </body>
    </html>
    