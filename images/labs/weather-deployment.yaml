apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-dashboard
  labels:
    app: weather-dashboard
    tier: frontend
    environment: training
  annotations:
    kubernetes.io/description: "Weather dashboard for training purposes"
    prometheus.io/scrape: "true"
    prometheus.io/port: "9113"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: weather-dashboard
  template:
    metadata:
      labels:
        app: weather-dashboard
        tier: frontend
        environment: training
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
    spec:
      # Remove securityContext at pod level to allow nginx to create temp directories
      containers:
        - name: nginx
          image: nginx:1.28.0_alpines.21_slim
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            timeoutSeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            timeoutSeconds: 2
            periodSeconds: 10
          volumeMounts:
            - name: html-content
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          env:
            - name: NGINX_HOST
              value: weather-dashboard
            - name: NGINX_PORT
              value: "80"
      initContainers:
        - name: weather-dashboard
          image: alpine:latest
          command: ['sh', '-c', 'mkdir -p /data/html && echo "<html><head><title>Weather Dashboard</title><meta charset=\"UTF-8\"><meta http-equiv=\"refresh\" content=\"30\"><style>body{font-family:Arial,sans-serif;margin:40px;line-height:1.6;} h1{color:white;background-color:#3498db;padding:15px;border-radius:5px;}</style></head><body><h1>Weather Dashboard</h1><p>Loading weather data for Reykjavík...</p></body></html>" > /data/html/index.html']
          volumeMounts:
            - name: html-content
              mountPath: /data/html
        - name: config-initializer
          image: busybox:latest
          command: ['sh', '-c', 'echo "server { listen 80; server_name localhost; location / { root /usr/share/nginx/html; index index.html; } }" > /config/default.conf']
          volumeMounts:
            - name: nginx-config
              mountPath: /config
        - name: weather-sidecar
          image: alpine:latest
          restartPolicy: Always
          command: ['sh', '-c', 'apk add --no-cache curl jq && while true; do TIMESTAMP=$(date); WEATHER_DATA=$(curl -s "https://api.openweathermap.org/data/2.5/weather?q=Reykjavik&units=metric&appid=YOUR_API_KEY_HERE" || echo "{\"main\":{\"temp\":5,\"humidity\":65},\"wind\":{\"speed\":8},\"weather\":[{\"main\":\"Cloudy\"}]}"); if [ $? -eq 0 ] && [ "$(echo $WEATHER_DATA | grep -c error)" -eq 0 ]; then TEMP=$(echo $WEATHER_DATA | jq -r ".main.temp // 5"); HUMIDITY=$(echo $WEATHER_DATA | jq -r ".main.humidity // 65"); WIND=$(echo $WEATHER_DATA | jq -r ".wind.speed // 8"); CONDITION=$(echo $WEATHER_DATA | jq -r ".weather[0].main // \"Cloudy\""); else TEMP=5; HUMIDITY=65; WIND=8; CONDITION="Cloudy (fallback)"; fi; echo "<html><head><title>Reykjavík Weather</title><meta charset=\"UTF-8\"><meta http-equiv=\"refresh\" content=\"30\"><style>body{font-family:Arial,sans-serif;margin:40px;line-height:1.6;background-color:#f8f9fa;} h1{color:white;background-color:#3498db;padding:15px;border-radius:5px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,0.1);} table{border-collapse:collapse;width:100%;margin-top:20px;box-shadow:0 2px 5px rgba(0,0,0,0.1);} th,td{text-align:left;padding:12px;border-bottom:1px solid #ddd;} th{background-color:#ebf5fb;color:#2874a6;} tr:hover{background-color:#f5f5f5;}</style></head><body><h1>Reykjavík Weather Dashboard</h1><p>Last updated: $TIMESTAMP</p><table><tr><th>Weather Metrics</th><th>Current Values</th></tr><tr><td>Temperature</td><td>${TEMP}°C</td></tr><tr><td>Humidity</td><td>${HUMIDITY}%</td></tr><tr><td>Wind Speed</td><td>${WIND} m/s</td></tr><tr><td>Condition</td><td>${CONDITION}</td></tr></table><p><small>Data source: OpenWeatherMap API</small></p></body></html>" > /data/html/index.html; sleep 300; done']
          volumeMounts:
            - name: html-content
              mountPath: /data/html
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: html-content
          emptyDir: {}
        - name: nginx-config
          emptyDir: {}